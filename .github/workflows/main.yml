name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          brew install jq automake autoconf libtool pkg-config

      - name: Total Manual Setup
        run: |
          # 1. Clone the REAL source code into a specific folder
          git clone --recursive https://github.com/blinksh/blink.git blink-source
          
          # 2. Move the builder script INTO the source folder
          cp build-blink-shell-gpl.sh blink-source/
          
          # 3. Enter the folder and fix the syntax error locally
          cd blink-source
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 4. RUN THE BUILD from inside the source folder
          # This forces xcodebuild to see Blink.xcodeproj in the current directory
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0
          
          # 5. Move the finished IPA back to the root for uploading
          mkdir -p ../dist
          cp dist/*.ipa ../dist/ 2>/dev/null || cp *.ipa ../dist/ 2>/dev/null || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-v18.6.0
          path: "dist/*.ipa"
