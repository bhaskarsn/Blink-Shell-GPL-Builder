name: Build Blink Shell
on: [workflow_dispatch]

[span_2](start_span)jobs:
  build:
    runs-on: macos-14 # Uses a more stable macOS environment for compilation[span_2](end_span)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          # Use a loop to check for tools and avoid "already installed" errors
          for tool in jq automake autoconf libtool pkg-config; do
            if ! command -v $tool &> /dev/null; then
              brew install $tool || true
            fi
          done

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # Explicitly specify version v18.[span_3](start_span)6.1 and use --overwrite to ensure a clean source[span_3](end_span)
          ./build-blink-shell-gpl.sh --build --overwrite v18.6.1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-v18.6.1-IPA
          path: "dist/*.[span_4](start_span)ipa" # The builder script puts finished files in the dist/ folder[span_4](end_span)
