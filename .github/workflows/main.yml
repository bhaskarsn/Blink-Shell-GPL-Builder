name: Build Blink Shell (2026 Ironclad Protocol)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Latest SDK
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Using SDK: $XCODE_PATH"
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: Deploy Ironclad Hooks
        run: |
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # 🛡️ HOOK 1: Prevent get_resources corruption & Project destruction
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/sed
          #!/bin/bash
          if [[ "$*" == *"project.pbxproj"* || "$*" == *"get_resources.sh"* ]]; then 
              echo "🛡️ Shield: Blocked file corruption attempt."
              exit 0 
          fi
          /usr/bin/sed "$@"
          EOF
          
          # 🛡️ HOOK 2: The Compiler Hijack (Fix iOS 18/26 UI Errors)
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/xcodebuild
          #!/bin/bash
          echo "🧬 Hijack: Patching source code for iPadOS 26 compatibility..."
          find . -name "KBAccessoryView.swift" -exec /usr/bin/sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' {} +
          find . -name "KBAccessoryView.swift" -exec /usr/bin/sed -i '' 's/UIGlassEffect/UIBlurEffect/g' {} +
          find . -name "KBAccessoryView.swift" -exec /usr/bin/sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' {} +
          # Hand off to the real compiler
          /usr/bin/xcodebuild "$@"
          EOF
          
          # 🛡️ HOOK 3: Anti-Ghost Build Guard
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/zip
          #!/bin/bash
          if [[ "$*" == *"Payload"* ]]; then
              # Verify the main Blink engine binary is actually compiled and large
              EXE=$(find . -name "Blink" -type f -maxdepth 4)
              if [ -n "$EXE" ]; then
                  FILESIZE=$(stat -f%z "$EXE")
                  if [ "$FILESIZE" -lt 25000000 ]; then
                      echo "❌ ERROR: Main engine too small ($FILESIZE bytes). Ghost build detected!"
                      exit 1
                  fi
                  echo "✅ Main engine verified ($FILESIZE bytes). Packaging..."
              fi
          fi
          /usr/bin/zip -y "$@"
          EOF
          
          chmod +x $GITHUB_WORKSPACE/fake_bin/*
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # Fix script syntax error
          /usr/bin/sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          # Block malware and cleanup
          /usr/bin/sed -i '' 's/.*SideloadFix.dylib.*/# Blocked/g' build-blink-shell-gpl.sh
          /usr/bin/sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "🚀 Compiling..."
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0 > build_debug.log 2>&1

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-2026-Verified
          path: "dist/*.ipa"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-Logs
          path: |
            build_debug.log
            build-output/build.log
