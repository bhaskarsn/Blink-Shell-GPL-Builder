name: Build Blink Shell IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: |
          XCODE=$(ls /Applications | grep "Xcode_" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer

      - name: Install dependencies (Homebrew)
        run: |
          brew install cmake
          brew install ninja

      - name: Set up Ruby & CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install Pod dependencies
        run: pod install --repo-update
        continue-on-error: true

      - name: Build IPA (unsigned)
        run: |
          xcodebuild \
            -workspace Blink.xcworkspace \
            -scheme Blink \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package IPA
        run: |
          APP_PATH=$(find ./build -name "*.app" | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Blink.ipa Payload
          echo "IPA built at: Blink.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-unsigned
          path: Blink.ipa
          retention-days: 7
