name: Build Blink Shell IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Blink version tag (e.g. v18.4.2), leave empty for latest'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout GPL Builder repo
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          XCODE=$(ls /Applications | grep "Xcode_" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Clone Blink source
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "Cloning latest Blink source..."
            git clone --recursive https://github.com/blinksh/blink.git blink-src
          else
            echo "Cloning Blink $VERSION..."
            git clone --recursive --branch "$VERSION" https://github.com/blinksh/blink.git blink-src
          fi

      - name: Get prebuilt frameworks
        working-directory: blink-src
        run: ./get_frameworks.sh

      - name: Get resources
        working-directory: blink-src
        run: |
          if [ -f "./get_resources.sh" ]; then
            ./get_resources.sh
          else
            echo "No get_resources.sh found, skipping"
          fi

      - name: Remove shared data (avoids signing conflicts)
        working-directory: blink-src
        run: rm -rf Blink.xcodeproj/project.xcworkspace/xcshareddata/

      - name: Build IPA (unsigned)
        working-directory: blink-src
        run: |
          set -o pipefail
          xcodebuild \
            -project Blink.xcodeproj \
            -scheme Blink \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            clean build 2>&1 | tee ../build.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Fail if build failed
        if: always()
        run: |
          if [ "${BUILD_EXIT}" != "0" ]; then
            echo "Build failed with exit code ${BUILD_EXIT}. Check build-log artifact."
            exit 1
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find ./build -name "*.app" -not -path "*/Release-iphonesimulator/*" | head -n 1)
          echo "Found .app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Blink.ipa Payload
          ls -lh Blink.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-unsigned
          path: Blink.ipa
          retention-days: 7
