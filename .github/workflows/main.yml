name: Build Blink Shell (Ironclad 2026)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Latest SDK
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: Deploy Ironclad Hooks
        run: |
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # 🛡️ HOOK 1: The Compiler Hijack
          # This patches the code at the absolute last millisecond before compilation
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/xcodebuild
          #!/bin/bash
          echo "🧬 Ironclad Hijack: Patching source code..."
          # Find the file wherever it is and fix the iOS 18/26 incompatibilities
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' {} +
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/UIGlassEffect/UIBlurEffect/g' {} +
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' {} +
          
          # Hand off to the real compiler
          /usr/bin/xcodebuild "$@"
          EOF
          
          # 🛡️ HOOK 2: The Binary Size Guard
          # This hook will physically kill the build if the result is a 44MB shell
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/zip
          #!/bin/bash
          # Look for the Blink binary in the folder being zipped
          if [[ "$*" == *"Payload"* ]]; then
              BINARY_CHECK=$(find . -name "Blink" -type f -size +50M)
              if [ -z "$BINARY_CHECK" ]; then
                  echo "❌ FATAL ERROR: Ghost Build Detected (44MB Shell). Engine binary is missing or too small."
                  exit 1
              fi
              echo "✅ Engine binary verified (>50MB). Proceeding to package..."
          fi
          /usr/bin/zip -y "$@"
          EOF
          
          chmod +x $GITHUB_WORKSPACE/fake_bin/*
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # Fix script syntax
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          # Block malware injection and auto-cleanup
          sed -i '' 's/.*SideloadFix.dylib.*/# Blocked/g' build-blink-shell-gpl.sh
          sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "🚀 Starting Ironclad Compilation..."
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0 > full_debug.log 2>&1

      - name: Upload Ironclad IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-Verified-IPA
          path: "dist/*.ipa"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Logs
          path: |
            full_debug.log
            build-output/build.log
