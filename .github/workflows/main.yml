name: Build Blink Shell (Auto-Xcode & Pure Package)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Found Xcode at: $XCODE_PATH"
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: The Upgraded Shield & Surgical Patch
        run: |
          echo "Setting up Upgraded Systemless Shield..."
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # 🛡️ INTERCEPTOR 1: Block destructive file edits from the main script
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/sed
          #!/bin/bash
          if [[ "$*" == *"project.pbxproj"* ]]; then exit 0; fi
          if [[ "$*" == *"get_resources.sh"* ]]; then exit 0; fi
          /usr/bin/sed "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/fake_bin/sed
          
          # 🛡️ INTERCEPTOR 2: Hijack the compiler to patch the broken Swift code instantly before it runs
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/xcodebuild
          #!/bin/bash
          TARGET="blink-src/Blink/SmarterKeys/KBAccessoryView.swift"
          if [ -f "$TARGET" ]; then
              echo "🧬 SURGICAL STRIKE: Removing broken iOS 18 UI effects..."
              /usr/bin/sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' "$TARGET"
              /usr/bin/sed -i '' 's/UIGlassEffect/UIBlurEffect/g' "$TARGET"
              /usr/bin/sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' "$TARGET"
          fi
          # Hand control over to the real compiler
          /usr/bin/xcodebuild "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/fake_bin/xcodebuild
          
          # Activate the hooks
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # Fix bash syntax error in the main script
          /usr/bin/sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # NEUTRALIZE CLEANUP
          /usr/bin/sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          # NEUTRALIZE MALWARE INJECTION
          /usr/bin/sed -i '' 's/.*SideloadFix.dylib.*/# Blocked SideloadFix/g' build-blink-shell-gpl.sh
          /usr/bin/sed -i '' 's/.*insert_dylib.*/# Blocked insert_dylib/g' build-blink-shell-gpl.sh
          
          echo "Compiling and forcing ALL output to a raw log file..."
          chmod +x build-blink-shell-gpl.sh
          
          # NO CHEAT CODES. If it fails, the workflow stops.
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0 > $GITHUB_WORKSPACE/ultimate_debug.log 2>&1

      - name: Manual Clean Packaging
        run: |
          echo "=================================================="
          echo "📦 Stealing the raw app for LiveContainer packaging..."
          echo "=================================================="
          
          APP_PATH="build-output/Products/Blink.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ ERROR: Blink.app not found at $APP_PATH! The compiler crashed."
            exit 1
          fi
          
          echo "✅ Found untouched, uninjected compiled app!"
          
          mkdir -p Pure_IPA/Payload
          cp -R "$APP_PATH" Pure_IPA/Payload/
          
          cd Pure_IPA
          # -y preserves symlinks so the internal C++ frameworks map correctly!
          zip -qry Blink-LiveContainer-Pure.ipa Payload
          echo "✅ Clean IPA successfully generated!"

      - name: Upload Pure IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blink-LiveContainer-Pure
          path: "Pure_IPA/*.ipa"

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Debug-Logs
          path: ultimate_debug.log
