name: Build Blink Shell (Ultimate Log & Pure Package)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: The Shield & Build Phase
        run: |
          echo "Setting up Systemless Shield..."
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # Intercept destructive project file edits
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/sed
          #!/bin/bash
          if [[ "$*" == *"project.pbxproj"* ]]; then exit 0; fi
          /usr/bin/sed "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/fake_bin/sed
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # Fix bash syntax error
          /usr/bin/sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # NEUTRALIZE CLEANUP: Stop the script from deleting the app when it finishes
          /usr/bin/sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "Compiling and forcing ALL output to a raw log file..."
          chmod +x build-blink-shell-gpl.sh
          
          # The || true ensures the workflow continues so logs are uploaded even on a crash
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0 > $GITHUB_WORKSPACE/ultimate_debug.log 2>&1 || true

      - name: Manual Clean Packaging
        run: |
          echo "=================================================="
          echo "📦 Stealing the raw app for LiveContainer packaging..."
          echo "=================================================="
          
          # Broaden the search to the entire workspace just in case
          APP_PATH=$(find . -type d -name "Blink.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: Blink.app not found! The compiler crashed before finishing."
            echo "🚨 CHECK THE 'Build-Debug-Logs' ARTIFACT FOR THE EXACT ERROR."
            exit 1
          fi
          
          echo "✅ Found untouched compiled app at: $APP_PATH"
          
          # Create the strict structure LiveContainer requires
          mkdir -p Pure_IPA/Payload
          cp -R "$APP_PATH" Pure_IPA/Payload/
          
          # Zip it cleanly
          cd Pure_IPA
          zip -qr Blink-LiveContainer-Pure.ipa Payload
          echo "✅ Clean IPA successfully generated!"

      - name: Upload Pure IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blink-LiveContainer-Pure
          path: "Pure_IPA/*.ipa"

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Debug-Logs
          path: ultimate_debug.log
