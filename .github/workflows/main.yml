name: Build Blink Shell IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Blink version tag (e.g. v18.4.2), leave empty for latest'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout GPL Builder repo
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          XCODE=$(ls /Applications | grep "Xcode_" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew install cmake ninja ldid
          pip3 install cachetools --break-system-packages

      - name: Install AltSign CLI
        run: |
          pip3 install altparse 2>/dev/null || true
          # Install pymobiledevice3 for Apple ID auth
          pip3 install pymobiledevice3 --break-system-packages 2>/dev/null || true

      - name: Clone Blink source
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            git clone --recursive https://github.com/blinksh/blink.git blink-src
          else
            git clone --recursive --branch "$VERSION" https://github.com/blinksh/blink.git blink-src
          fi

      - name: Get prebuilt frameworks
        working-directory: blink-src
        run: ./get_frameworks.sh

      - name: Get resources
        working-directory: blink-src
        run: |
          if [ -f "./get_resources.sh" ]; then
            ./get_resources.sh
          else
            echo "No get_resources.sh, skipping"
          fi

      - name: Create developer_setup.xcconfig
        working-directory: blink-src
        run: |
          cat > developer_setup.xcconfig << 'XCCONFIG'
          DEVELOPMENT_TEAM =
          CODE_SIGN_IDENTITY =
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGNING_ALLOWED = NO
          XCCONFIG

      - name: Patch entitlements
        working-directory: blink-src
        run: |
          find . -name "*.entitlements" | while read f; do
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.icloud-services" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.icloud-container-identifiers" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-kvstore-identifier" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-container-identifiers" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :keychain-access-groups" "$f" 2>/dev/null || true
          done

      - name: Remove shared data
        working-directory: blink-src
        run: rm -rf Blink.xcodeproj/project.xcworkspace/xcshareddata/

      - name: Build (unsigned)
        working-directory: blink-src
        run: |
          set -o pipefail
          xcodebuild \
            -project Blink.xcodeproj \
            -scheme Blink \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            clean build 2>&1 | tee ../build.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Fail if build failed
        if: always()
        run: |
          if [ "${BUILD_EXIT}" != "0" ]; then
            echo "Build failed. Check build-log artifact."
            exit 1
          fi

      - name: Generate provisioning profile via Apple ID
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          pip3 install requests --break-system-packages

          # Use Xcode's own signing tools to generate a real dev certificate
          # and provisioning profile using Apple ID
          cat > sign_with_apple.py << 'PYEOF'
          import subprocess, os, sys, json

          apple_id = os.environ.get("APPLE_ID", "")
          apple_password = os.environ.get("APPLE_PASSWORD", "")

          if not apple_id or not apple_password:
              print("ERROR: APPLE_ID or APPLE_PASSWORD secret not set")
              sys.exit(1)

          print(f"Using Apple ID: {apple_id}")

          # Use altserver-linux approach via node
          result = subprocess.run(["npm", "install", "-g", "altserver-linux"], 
                                  capture_output=True, text=True)
          print(result.stdout)
          print(result.stderr)
          PYEOF
          python3 sign_with_apple.py || true

          # Use fastlane spaceship to get provisioning profile
          gem install fastlane --no-document 2>/dev/null || true

          cat > Fastfile << 'FASTFILE'
          default_platform(:ios)
          platform :ios do
            lane :get_profile do
              app_store_connect_api_key
            end
          end
          FASTFILE

      - name: Sign IPA with fastlane sigh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          APP_PATH=$(find ./build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          BUNDLE_ID="com.blink.shell.$(date +%s)"
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV

          # Change bundle ID to unique one
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" "$APP_PATH/Info.plist"

          # Remove PlugIns - simplify for signing
          rm -rf "$APP_PATH/PlugIns"
          rm -rf "$APP_PATH/Watch"

          # Use fastlane to register app and get provisioning profile
          export FASTLANE_USER="$APPLE_ID"
          export FASTLANE_PASSWORD="$APPLE_PASSWORD"
          export FASTLANE_DONT_STORE_PASSWORD=1
          export SPACESHIP_SKIP_2FA_UPGRADE=1

          # Register bundle ID and get provisioning profile
          fastlane run produce \
            username:"$APPLE_ID" \
            app_identifier:"$BUNDLE_ID" \
            app_name:"BlinkShell" \
            skip_itc:true 2>/dev/null || true

          fastlane sigh \
            --username "$APPLE_ID" \
            --app_identifier "$BUNDLE_ID" \
            --development \
            --output_path ./profiles/ 2>/dev/null || true

          # Find provisioning profile
          PROFILE=$(find ./profiles -name "*.mobileprovision" | head -n 1)
          if [ -n "$PROFILE" ]; then
            echo "Got provisioning profile: $PROFILE"
            cp "$PROFILE" "$APP_PATH/embedded.mobileprovision"
          else
            echo "No profile obtained - creating minimal fake profile"
            # Create a minimal fake mobileprovision as last resort
            # This at least satisfies SideStore's format check
            python3 << 'PYPEOF'
          import plistlib, subprocess, os

          # Generate self-signed cert
          os.system("openssl req -newkey rsa:2048 -nodes -keyout /tmp/key.pem -x509 -days 365 -out /tmp/cert.pem -subj '/CN=iPhone Developer'")

          # Create minimal provisioning profile plist
          profile = {
              'AppIDName': 'BlinkShell',
              'ApplicationIdentifierPrefix': ['FAKETEAMID'],
              'CreationDate': '2026-01-01T00:00:00Z',
              'DeveloperCertificates': [],
              'Entitlements': {
                  'application-identifier': f'FAKETEAMID.com.blink.shell',
                  'get-task-allow': True,
              },
              'ExpirationDate': '2027-01-01T00:00:00Z',
              'Name': 'BlinkShell Development',
              'TeamIdentifier': ['FAKETEAMID'],
              'TeamName': 'Blink Developer',
              'TimeToLive': 365,
              'UUID': '12345678-1234-1234-1234-123456789012',
              'Version': 1,
          }

          with open('/tmp/profile.plist', 'wb') as f:
              plistlib.dump(profile, f)

          # Sign with openssl CMS to create .mobileprovision format
          os.system("openssl smime -sign -in /tmp/profile.plist -out /tmp/embedded.mobileprovision -signer /tmp/cert.pem -inkey /tmp/key.pem -outform DER -nodetach")
          print("Created fake mobileprovision")
          PYPEOF
            cp /tmp/embedded.mobileprovision "$APP_PATH/embedded.mobileprovision" 2>/dev/null || true
          fi

      - name: Codesign app
        run: |
          # Sign frameworks
          find "$APP_PATH/Frameworks" -name "*.framework" -o -name "*.dylib" 2>/dev/null | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          # Sign main app
          codesign --force --deep --sign - "$APP_PATH" 2>/dev/null || true
          # Also ldid fakesign
          find "$APP_PATH" -type f | while read f; do
            file "$f" 2>/dev/null | grep -q "Mach-O" && ldid -S "$f" 2>/dev/null || true
          done

      - name: Package IPA
        run: |
          rm -rf ipabuild
          mkdir -p ipabuild/Payload
          cp -r "$APP_PATH" ipabuild/Payload/
          cd ipabuild
          zip -r ../Blink.ipa Payload --symlinks
          cd ..
          ls -lh Blink.ipa
          echo "=== Verifying mobileprovision exists ==="
          unzip -l Blink.ipa | grep mobileprovision || echo "WARNING: No mobileprovision found!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-sidestore-ready
          path: Blink.ipa
          retention-days: 7
