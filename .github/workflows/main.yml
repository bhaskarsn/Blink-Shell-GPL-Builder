name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          for tool in jq automake autoconf libtool pkg-config; do
            if ! command -v $tool &> /dev/null; then
              brew install $tool || true
            fi
          done

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # v18.6.0 is the confirmed stable tag for the current major release
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-v18.6.0-IPA
          path: "dist/*.ipa"
          
      - name: Debug Logs (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log-File
          path: "build-output/build.log"
