name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # This ensures we get the "engine" code

      - name: Setup Dependencies
        run: |
          brew install jq automake autoconf libtool pkg-config

      - name: Surgical Syntax Fix
        run: |
          # Instead of returning 0, we fix the "unexpected }" error 
          # by adding a ':' (do nothing) inside any empty blocks.
          sed -i '' 's/fix_package_dependencies() {/fix_package_dependencies() { :/g' build-blink-shell-gpl.sh
          sed -i '' 's/fix_team_id() {/fix_team_id() { :/g' build-blink-shell-gpl.sh

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # We remove the --clean flag to allow it to use the submodules we just checked out
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Full-v18.6.0
          path: "dist/*.ipa"
