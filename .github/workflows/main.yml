name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          for tool in jq automake autoconf libtool pkg-config; do
            if ! command -v $tool &> /dev/null; then
              brew install $tool || true
            fi
          done

      - name: Patch the Patcher (Fix Corrupted Project)
        run: |
          # These two functions are currently corrupting the project file syntax.
          # We will comment them out so the project remains valid.
          sed -i '' 's/fix_package_dependencies/# fix_package_dependencies/g' build-blink-shell-gpl.sh
          sed -i '' 's/fix_team_id/# fix_team_id/g' build-blink-shell-gpl.sh

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # Using v18.6.0 as the confirmed stable target
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-v18.6.0-IPA
          path: "dist/*.ipa"
