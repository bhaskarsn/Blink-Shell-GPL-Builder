name: Blink Shell (2026 Clean Hands Protocol)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Xcode 16.2
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.2*.app | head -n 1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config || true

      - name: Target-Specific Script Patches
        run: |
          # Verify script existence
          if [ ! -f "build-blink-shell-gpl.sh" ]; then exit 1; fi
          
          # 1. Disable the SideloadFix that crashes LiveContainer and 'curl[span_3](start_span)[span_4](start_span)'[span_3](end_span)[span_4](end_span)
          sed -i '' 's/inject_sideload_fix/echo "🛡️ Shield: SideloadFix Disabled"/g' build-blink-shell-gpl.sh
          
          # 2. Disable the resource fix that causes syntax errors on line 8[span_5](start_span)[span_5](end_span)
          sed -i '' 's/fix_get_resources/echo "🛡️ Shield: Resource Fix Disabled"/g' build-blink-shell-gpl.sh
          
          # 3. Stop the script from deleting the app folder so we can zip it ourselves[span_6](start_span)[span_6](end_span)
          sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "✅ Script cleaned safely without breaking functions."

      - name: Compile with Surgical Compiler Hook
        run: |
          # This hook fixes the iOS 18 UI errors the second the compiler starts
          mkdir -p bin_hook
          cat << 'EOF' > bin_hook/xcodebuild
          #!/bin/bash
          echo "🧬 Surgical Hook: Patching iPadOS 26 UI code..."
          TARGET="blink-src/Blink/SmarterKeys/KBAccessoryView.swift"
          if [ -f "$TARGET" ]; then
              sed -i '' 's/UIGlassEffect/UIBlurEffect/g' "$TARGET"
              sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' "$TARGET"
              sed -i '' 's/.*isInteractive.*/\/\/ removed/g' "$TARGET"
              sed -i '' 's/.*tintColor.*/\/\/ removed/g' "$TARGET"
          fi
          /usr/bin/xcodebuild "$@"
          EOF
          chmod +x bin_hook/xcodebuild
          export PATH="$(pwd)/bin_hook:$PATH"
          
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: 2026 Integrity Packaging
        run: |
          # Dynamically find the HEAVIEST Blink.app (the 150MB+ one)[span_7](start_span)[span_7](end_span)[span_8](start_span)[span_8](end_span)
          APP_PATH=$(find . -name "Blink.app" -type d | xargs du -s | sort -n | tail -1 | awk '{print $2}')
          
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Blink" ]; then
             echo "❌ FAIL: Ghost Build detected. Executable binary missing."
             exit 1
          fi
          
          echo "✅ Full Engine Verified: $(du -sh $APP_PATH)"
          
          mkdir -p Pure_IPA/Payload
          cp -R "$APP_PATH" Pure_IPA/Payload/
          cd Pure_IPA
          # -y flag is mandatory to preserve symlinks for iPadOS 26 mapping[span_9](start_span)[span_9](end_span)
          zip -qry Blink-v18.6.0-Pure.ipa Payload

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Pure-150MB-IPA
          path: "Pure_IPA/*.ipa"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Logs
          path: build-output/build.log
