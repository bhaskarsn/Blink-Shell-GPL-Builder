name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder Script
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          brew install jq automake autoconf libtool pkg-config

      - name: Manual Source Retrieval
        run: |
          # We clone the actual Blink source code into a folder named 'blink'
          # This is the "DNA" that was missing in your 46MB build.
          git clone --recursive https://github.com/blinksh/blink.git blink
          
          # Fix the syntax error in the builder script so it doesn't crash on the '}'
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # We run the build. The script will find the 'blink' folder we just cloned.
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Full-Manual-v18.6.0
          path: "dist/*.ipa"
