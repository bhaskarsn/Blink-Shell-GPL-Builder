name: Build Blink Shell (GPL Native Protocol)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Xcode 16 (Required for v18.6.0)
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Setup Build Tools
        run: brew install jq automake autoconf libtool pkg-config

      - name: De-Toxify Build Script
        run: |
          # 1. Fix the bash syntax error that kills the resource loader
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 2. DELETE the Malware Injection block entirely
          # This prevents the 'curl' crash and ensures the binary is LiveContainer-safe
          sed -i '' '/Injecting SideloadFix.dylib/,/insert_dylib/d' build-blink-shell-gpl.sh
          
          # 3. Force the script to use the Symlink-Preserving zip flag
          sed -i '' 's/zip -r/zip -ry/g' build-blink-shell-gpl.sh
          
          # 4. Stop the script from deleting the app folder at the end
          sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "✅ Builder script cleaned and ready for iPadOS 26."

      - name: Execute Native Build
        run: |
          # We deploy one surgical hook to fix the iOS 18/26 UI code errors
          mkdir -p fake_bin
          cat << 'EOF' > fake_bin/xcodebuild
          #!/bin/bash
          # Patch source code the moment the script starts the compiler
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' {} +
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/UIGlassEffect/UIBlurEffect/g' {} +
          find . -name "KBAccessoryView.swift" -exec sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' {} +
          /usr/bin/xcodebuild "$@"
          EOF
          chmod +x fake_bin/xcodebuild
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"

          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Verify and Package IPA
        run: |
          # Find the actual compiled app (the 150MB+ one)
          APP_PATH=$(find . -name "Blink.app" -type d -not -path "./dist/*" | xargs du -s | sort -n | tail -1 | awk '{print $2}')
          echo "📊 Final App Size: $(du -sh $APP_PATH)"
          
          mkdir -p Final_IPA/Payload
          cp -R "$APP_PATH" Final_IPA/Payload/
          cd Final_IPA
          # -y is critical for your iPadOS 26 mapping
          zip -qry Blink-Verified-iPadOS26.ipa Payload
          echo "✅ IPA generated."

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-IPA
          path: "Final_IPA/*.ipa"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: |
            build-output/build.log
