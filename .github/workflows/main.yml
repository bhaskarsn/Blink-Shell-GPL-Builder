name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: The Shield Build (PATH Override)
        run: |
          echo "Setting up Systemless Shield..."
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # 1. Create our "Fake sed" interceptor
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/sed
          #!/bin/bash
          # If the script tries to edit the project file, we block it and pretend it succeeded.
          if [[ "$*" == *"project.pbxproj"* ]]; then
              echo "🛡️ SHIELD: Blocked destructive sed command on project.pbxproj!"
              exit 0 
          fi
          # For all other commands (like bypassing the paywall), run the real macOS sed.
          /usr/bin/sed "$@"
          EOF
          
          # Make our fake sed executable
          chmod +x $GITHUB_WORKSPACE/fake_bin/sed
          
          # 2. Put our shield at the very front of the system PATH
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # 3. Use the REAL sed one time to fix the bash syntax "()" crash
          /usr/bin/sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 4. Launch the builder script!
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blink-LiveContainer-v18.6.0
          path: "dist/*.ipa"

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Debug-Logs
          path: |
            build-output/build.log
            *.log
