name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: The Interceptor Build
        run: |
          # 1. Create the Interceptor script to hijack the compiler
          cat << 'EOF' > fake_xcodebuild
          #!/bin/bash
          echo "========================================"
          echo "🛡️ INTERCEPTOR ACTIVE: Healing Project DNA..."
          echo "========================================"
          
          # The script broke the file. We heal it right before Xcode opens it.
          if [ -d "blink-src" ]; then
              git -C blink-src checkout Blink.xcodeproj/project.pbxproj
          elif [ -d "blink" ]; then
              git -C blink checkout Blink.xcodeproj/project.pbxproj
          fi
          
          echo "🧬 Project file restored. Launching real compiler..."
          
          # Pass control to the real Xcode compiler with all original arguments
          /usr/bin/xcodebuild "$@"
          EOF
          
          # Make the interceptor executable
          chmod +x fake_xcodebuild
          
          # 2. Swap out the word 'xcodebuild' in the script with our interceptor
          sed -i '' 's/\bxcodebuild\b/.\/fake_xcodebuild/g' build-blink-shell-gpl.sh
          
          # 3. Fix the empty function crash (the original syntax error)
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 4. Run the builder script
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blink-LiveContainer-v18.6.0
          path: "dist/*.ipa"

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Debug-Logs
          path: |
            build-output/build.log
            *.log
