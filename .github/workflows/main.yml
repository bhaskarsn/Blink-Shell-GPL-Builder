name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          for tool in jq automake autoconf libtool pkg-config; do
            if ! command -v $tool &> /dev/null; then
              brew install $tool || true
            fi
          done

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # Passing 'raw' via the --version flag to avoid the 'Unknown option' error
          ./build-blink-shell-gpl.sh --build --overwrite --version raw

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-Latest-IPA
          path: "dist/*.ipa"
