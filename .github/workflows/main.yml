name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14 # Specifically use macOS 14 for better Xcode 15 support
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # Ensures all Blink sub-parts are downloaded

      - name: Setup Dependencies
        run: |
          brew install jq || true
          brew install automake autoconf libtool pkg-config || true

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-IPA
          path: "**/*.ipa" # Searches subfolders for the file
