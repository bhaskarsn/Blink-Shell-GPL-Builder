name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          brew install jq automake autoconf libtool pkg-config

      - name: Precision Syntax Repair
        run: |
          # Fix the "unexpected }" by ensuring empty blocks have a ':'
          # This keeps the cloning logic alive but stops the syntax crash
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # Force the script to use the correct version and skip the team ID check
          sed -i '' 's/fix_team_id() {/fix_team_id() { :/g' build-blink-shell-gpl.sh

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # We use --build and --overwrite to ensure a fresh, full compilation
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Surgical-v18.6.0
          path: "dist/*.ipa"
