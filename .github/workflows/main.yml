name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: Manual Clone & Structure Check
        run: |
          # 1. Clone into the EXACT folder the script usually expects
          git clone --recursive https://github.com/blinksh/blink.git blink
          
          # 2. Fix the syntax error but keep the functions functional
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 3. Check the structure so we can see it in the logs
          echo "Checking directory structure..."
          ls -d blink/*.xcodeproj || echo "ERROR: Project file not found where expected!"

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # We run it with the blink folder already present
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA (On Success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blink-IPA-v18.6.0
          path: "dist/*.ipa"

      - name: Upload Debug Logs (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Debug-Logs
          path: |
            build-output/build.log
            *.log
