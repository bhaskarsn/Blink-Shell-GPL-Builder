name: Build Blink Shell IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Blink version tag (e.g. v18.4.2), leave empty for latest'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout GPL Builder repo
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          XCODE=$(ls /Applications | grep "Xcode_" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone Blink source
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            git clone --recursive https://github.com/blinksh/blink.git blink-src
          else
            git clone --recursive --branch "$VERSION" https://github.com/blinksh/blink.git blink-src
          fi

      - name: Get prebuilt frameworks
        working-directory: blink-src
        run: ./get_frameworks.sh

      - name: Get resources
        working-directory: blink-src
        run: |
          if [ -f "./get_resources.sh" ]; then
            ./get_resources.sh
          else
            echo "No get_resources.sh, skipping"
          fi

      - name: Create developer_setup.xcconfig
        working-directory: blink-src
        run: |
          cat > developer_setup.xcconfig << 'XCCONFIG'
          DEVELOPMENT_TEAM =
          CODE_SIGN_IDENTITY =
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGNING_ALLOWED = NO
          XCCONFIG

      - name: Patch entitlements
        working-directory: blink-src
        run: |
          find . -name "*.entitlements" | while read f; do
            echo "Patching: $f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.icloud-services" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.icloud-container-identifiers" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-kvstore-identifier" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-container-identifiers" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :keychain-access-groups" "$f" 2>/dev/null || true
          done

      - name: Remove shared data
        working-directory: blink-src
        run: rm -rf Blink.xcodeproj/project.xcworkspace/xcshareddata/

      - name: Build (unsigned)
        working-directory: blink-src
        run: |
          set -o pipefail
          xcodebuild \
            -project Blink.xcodeproj \
            -scheme Blink \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            clean build 2>&1 | tee ../build.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Fail if build failed
        if: always()
        run: |
          if [ "${BUILD_EXIT}" != "0" ]; then
            echo "Build failed. Check build-log artifact."
            exit 1
          fi

      - name: Create self-signed certificate and sign IPA
        run: |
          APP_PATH=$(find ./build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          echo "Found .app at: $APP_PATH"

          # Remove extensions and watch app
          rm -rf "$APP_PATH/PlugIns"
          rm -rf "$APP_PATH/Watch"

          # Create a self-signed certificate for ad-hoc signing
          cat > cert.conf << 'CERTCONF'
          [ req ]
          default_bits        = 2048
          prompt              = no
          default_md          = sha256
          distinguished_name  = dn
          [ dn ]
          CN = iPhone Developer
          CERTCONF

          # Generate key and self-signed cert
          openssl req -newkey rsa:2048 -nodes -keyout key.pem -x509 -days 365 -out cert.pem -config cert.conf

          # Create a keychain and import the cert
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.pem -k build.keychain -T /usr/bin/codesign 2>/dev/null || true
          security import key.pem -k build.keychain -T /usr/bin/codesign 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain 2>/dev/null || true

          # Create minimal entitlements
          cat > entitlements.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>application-identifier</key>
              <string>TEAM.sh.blink.blinkshell</string>
              <key>get-task-allow</key>
              <false/>
          </dict>
          </plist>
          PLIST

          # Sign all frameworks first
          find "$APP_PATH/Frameworks" -name "*.framework" -o -name "*.dylib" 2>/dev/null | while read fw; do
            codesign --force --sign - "$fw" 2>/dev/null || true
          done

          # Sign the main app with ad-hoc signature (-)
          codesign --force --deep --sign - --entitlements entitlements.plist "$APP_PATH"
          echo "Signed with ad-hoc signature"

          # Package IPA
          rm -rf ipabuild
          mkdir -p ipabuild/Payload
          cp -r "$APP_PATH" ipabuild/Payload/
          cd ipabuild
          zip -r ../Blink.ipa Payload --symlinks
          cd ..
          ls -lh Blink.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-sidestore-ready
          path: Blink.ipa
          retention-days: 7
