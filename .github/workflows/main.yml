name: Build Blink Shell (The Final Fix)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Switch to Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Setup Dependencies
        run: brew install jq automake autoconf libtool pkg-config

      - name: Deploy Systemless Hooks
        run: |
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          
          # 🛡️ HOOK 1: Protect Project DNA & Patch iOS 18 Errors
          # We hijack 'sed' because the script calls it right after cloning.
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/sed
          #!/bin/bash
          # 1. Block destructive edits to project files
          if [[ "$*" == *"project.pbxproj"* || "$*" == *"get_resources.sh"* ]]; then exit 0; fi
          
          # 2. SURGICAL STRIKE: The moment 'sed' is used on the script, 
          # we know the source is cloned. We patch the iOS 18 errors now.
          TARGET="blink-src/Blink/SmarterKeys/KBAccessoryView.swift"
          if [ -f "$TARGET" ]; then
              /usr/bin/sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' "$TARGET"
              /usr/bin/sed -i '' 's/UIGlassEffect/UIBlurEffect/g' "$TARGET"
              /usr/bin/sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' "$TARGET"
          fi
          
          /usr/bin/sed "$@"
          EOF
          
          # 🛡️ HOOK 2: Neutralize Malware Injection
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/insert_dylib
          #!/bin/bash
          exit 0
          EOF
          
          # 🛡️ HOOK 3: Preserve Symlinks & Force 150MB+ Build
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/zip
          #!/bin/bash
          # If the script tries to zip a tiny 6MB file, we stop it.
          SIZE=$(du -sm . | cut -f1)
          if [ "$SIZE" -lt 50 ]; then
              echo "❌ ERROR: Binary engine missing (Ghost Build). Aborting."
              exit 1
          fi
          /usr/bin/zip -y "$@"
          EOF
          
          chmod +x $GITHUB_WORKSPACE/fake_bin/*
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"
          
          # Fix script syntax error
          /usr/bin/sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # NEUTRALIZE CLEANUP
          /usr/bin/sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "🚀 Compiling Full Engine..."
          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0 > build_process.log 2>&1

      - name: Upload Verified IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-Pure
          path: "dist/*.ipa"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-Logs
          path: |
            build_process.log
            build-output/build.log
