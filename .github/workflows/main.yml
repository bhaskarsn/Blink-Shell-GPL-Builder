name: Build Blink Shell
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          for tool in jq automake autoconf libtool pkg-config; do
            if ! command -v $tool &> /dev/null; then
              brew install $tool || true
            fi
          done

      - name: Patch the Patcher (Fix Syntax)
        run: |
          # We tell the functions to exit immediately (return 0) 
          # This prevents them from corrupting the project file.
          sed -i '' 's/fix_package_dependencies() {/fix_package_dependencies() { return 0;/g' build-blink-shell-gpl.sh
          sed -i '' 's/fix_team_id() {/fix_team_id() { return 0;/g' build-blink-shell-gpl.sh

      - name: Build IPA
        run: |
          chmod +x build-blink-shell-gpl.sh
          # Using the stable v18.6.0 tag
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Shell-v18.6.0-IPA
          path: "dist/*.ipa"
