name: Blink Master 2026
on: 
  workflow_dispatch: # This creates the "Run" button

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Compiler
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.2*.app | head -n 1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Fix Build Script DNA
        run: |
          # Disable functions that crash on GitHub servers or LiveContainer[span_5](start_span)[span_5](end_span)[span_6](start_span)[span_6](end_span)
          # We use 'true' to safely bypass without breaking Bash syntax[span_7](start_span)[span_7](end_span)
          sed -i '' 's/fix_get_resources/true/g' build-blink-shell-gpl.sh
          sed -i '' 's/inject_sideload_fix/true/g' build-blink-shell-gpl.sh
          sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          chmod +x build-blink-shell-gpl.sh

      - name: Build Terminal Engine
        run: |
          # Surgical Hook: Fixes UIGlassEffect errors in real-time
          mkdir -p bin_hook
          cat << 'EOF' > bin_hook/xcodebuild
          #!/bin/bash
          TARGET="blink-src/Blink/SmarterKeys/KBAccessoryView.swift"
          if [ -f "$TARGET" ]; then
              sed -i '' 's/UIGlassEffect/UIBlurEffect/g' "$TARGET"
              sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' "$TARGET"
              sed -i '' 's/.*isInteractive.*/\/\/ removed/g' "$TARGET"
          fi
          /usr/bin/xcodebuild "$@"
          EOF
          chmod +x bin_hook/xcodebuild
          export PATH="$(pwd)/bin_hook:$PATH"
          
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: Integrity Check & Package
        run: |
          # Identify the 150MB+ bundle and ignore 44MB shells[span_8](start_span)[span_8](end_span)[span_9](start_span)[span_9](end_span)
          APP_PATH=$(find . -name "Blink.app" -type d | xargs du -s | sort -n | tail -1 | awk '{print $2}')
          
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Blink" ]; then
            echo "❌ ERROR: Engine binary missing (Ghost Build)."
            exit 1
          fi
          
          echo "✅ Full Engine Verified: $(du -sh $APP_PATH)"
          
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          # -y flag is mandatory for iPadOS 26 mapping[span_10](start_span)[span_10](end_span)
          zip -qry Blink-v18.6.0-Full.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: Blink-2026-Full-Weight
          path: "dist/*.ipa"
