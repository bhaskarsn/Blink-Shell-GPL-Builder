name: Blink Shell (Final Boss 2026 Protocol)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Switch to Newest SDK
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Using SDK: $XCODE_PATH"
          sudo xcode-select -s $XCODE_PATH/Contents/Developer

      - name: Install Build Tools
        run: brew install jq automake autoconf libtool pkg-config

      - name: The DNA Scrub
        run: |
          echo "🧬 Scrubbing script self-sabotage..."
          # 1. Fix script syntax error
          sed -i '' 's/() {/() { :/g' build-blink-shell-gpl.sh
          
          # 2. DELETE the resource fix block that causes the line 8 crash
          sed -i '' '/Fixing get_resources.sh/,/done/d' build-blink-shell-gpl.sh
          
          # 3. DELETE the malware injection that crashes LiveContainer
          sed -i '' '/Injecting SideloadFix.dylib/,/insert_dylib/d' build-blink-shell-gpl.sh
          
          # 4. Block the script's internal cleanup so we can verify the binary
          sed -i '' 's/rm -rf /#rm -rf /g' build-blink-shell-gpl.sh
          
          echo "✅ Script is now pure and stable."

      - name: The Surgical Compile
        run: |
          # Create a hook to fix iOS 18/26 UI code the second compilation starts
          mkdir -p $GITHUB_WORKSPACE/fake_bin
          cat << 'EOF' > $GITHUB_WORKSPACE/fake_bin/xcodebuild
          #!/bin/bash
          echo "🧬 Surgical Hook: Patching iPadOS 26 UI errors..."
          TARGET_FILE="blink-src/Blink/SmarterKeys/KBAccessoryView.swift"
          if [ -f "$TARGET_FILE" ]; then
              sed -i '' 's/UIGlassEffect()/UIBlurEffect(style: .regular)/g' "$TARGET_FILE"
              sed -i '' 's/UIGlassEffect/UIBlurEffect/g' "$TARGET_FILE"
              sed -i '' 's/.*isInteractive.*/\/\/ removed/g' "$TARGET_FILE"
              sed -i '' 's/.*tintColor.*/\/\/ removed/g' "$TARGET_FILE"
              sed -i '' 's/.*cornerConfiguration.*/\/\/ removed/g' "$TARGET_FILE"
          fi
          /usr/bin/xcodebuild "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/fake_bin/xcodebuild
          export PATH="$GITHUB_WORKSPACE/fake_bin:$PATH"

          chmod +x build-blink-shell-gpl.sh
          ./build-blink-shell-gpl.sh --build --overwrite --version v18.6.0

      - name: The Integrity Shield (Packaging)
        run: |
          echo "🏗️ Verifying Engine Integrity..."
          # Hunt for the heavy Blink binary (>30MB)
          APP_PATH=$(find . -name "Blink.app" -type d -not -path "./dist/*" | xargs du -s | sort -n | tail -1 | awk '{print $2}')
          
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Blink" ]; then
            echo "❌ GHOST BUILD DETECTED: Engine binary missing. Compilation failed."
            exit 1
          fi
          
          SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "✅ Full Engine Verified ($SIZE). Packaging for iPadOS 26..."
          
          mkdir -p Final_IPA/Payload
          cp -R "$APP_PATH" Final_IPA/Payload/
          cd Final_IPA
          # Preserve symlinks strictly with -y for 2026 kernel mapping
          zip -qry Blink-v18.6.0-Full-2026.ipa Payload
          echo "✅ Hybrid IPA successfully assembled."

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blink-Final-Verified-IPA
          path: "Final_IPA/*.ipa"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Logs
          path: |
            build-output/build.log
